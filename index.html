        { name: "冷灰色", code: "Cool Gray", rgb: [128, 138, 145], label: "064" },

    // ==============================================================
    // CIEDE2000 色差算法实现
    // 参考标准：CIE D&E 2000 色差公式
    // 这是目前最精确的颜色差异评估方法，解决了深棕色误匹配的问题
    // ==============================================================
    
    // RGB 转 LAB 色彩空间
    function rgbToLab(r, g, b) {
        // 第一步：RGB 转 XYZ
        let var_R = r / 255;
        let var_G = g / 255;
        let var_B = b / 255;
        
        // sRGB 校正
        if (var_R > 0.04045) var_R = Math.pow((var_R + 0.055) / 1.055, 2.4);
        else var_R = var_R / 12.92;
        if (var_G > 0.04045) var_G = Math.pow((var_G + 0.055) / 1.055, 2.4);
        else var_G = var_G / 12.92;
        if (var_B > 0.04045) var_B = Math.pow((var_B + 0.055) / 1.055, 2.4);
        else var_B = var_B / 12.92;
        
        var_R = var_R * 100;
        var_G = var_G * 100;
        var_B = var_B * 100;
        
        // 观察者 = 2°,  illuminant = D65
        let X = var_R * 0.4124564 + var_G * 0.3575761 + var_B * 0.1804375;
        let Y = var_R * 0.2126729 + var_G * 0.7151522 + var_B * 0.0721750;
        let Z = var_R * 0.0193339 + var_G * 0.1191920 + var_B * 0.9503041;
        
        // 第二步：XYZ 转 LAB
        let var_X = X / 95.047;
        let var_Y = Y / 100.000;
        let var_Z = Z / 108.883;
        
        if (var_X > 0.008856) var_X = Math.pow(var_X, 1/3);
        else var_X = (7.787 * var_X) + (16 / 116);
        if (var_Y > 0.008856) var_Y = Math.pow(var_Y, 1/3);
        else var_Y = (7.787 * var_Y) + (16 / 116);
        if (var_Z > 0.008856) var_Z = Math.pow(var_Z, 1/3);
        else var_Z = (7.787 * var_Z) + (16 / 116);
        
        let L = (116 * var_Y) - 16;
        let a = 500 * (var_X - var_Y);
        let b_val = 200 * (var_Y - var_Z);
        
        return { L: L, a: a, b: b_val };
    }
    
    // CIEDE2000 色差计算核心函数
    function deltaE2000(lab1, lab2) {
        const L1 = lab1.L, a1 = lab1.a, b1 = lab1.b;
        const L2 = lab2.L, a2 = lab2.a, b2 = lab2.b;
        
        const C1 = Math.sqrt(a1 * a1 + b1 * b1);
        const C2 = Math.sqrt(a2 * a2 + b2 * b2);
        
        const C_avg = (C1 + C2) / 2;
        const G = 0.5 * (1 - Math.sqrt(Math.pow(C_avg, 7) / (Math.pow(C_avg, 7) + Math.pow(25, 7))));
        
        const a1_prime = a1 * (1 + G);
        const a2_prime = a2 * (1 + G);
        
        const C1_prime = Math.sqrt(a1_prime * a1_prime + b1 * b1);
        const C2_prime = Math.sqrt(a2_prime * a2_prime + b2 * b2);
        
        const h1_prime = (Math.atan2(b1, a1_prime) * 180 / Math.PI + 360) % 360;
        const h2_prime = (Math.atan2(b2, a2_prime) * 180 / Math.PI + 360) % 360;
        
        const dL_prime = L2 - L1;
        const dC_prime = C2_prime - C1_prime;
        
        let dh_prime = 0;
        if (C1_prime * C2_prime !== 0) {
            let dh = h2_prime - h1_prime;
            if (dh > 180) dh -= 360;
            else if (dh < -180) dh += 360;
            dh_prime = 2 * Math.sqrt(C1_prime * C2_prime) * Math.sin((dh * Math.PI / 360));
        }
        
        const L_avg_prime = (L1 + L2) / 2;
        const C_avg_prime = (C1_prime + C2_prime) / 2;
        
        let h_avg_prime = (h1_prime + h2_prime) / 2;
        if (C1_prime * C2_prime !== 0) {
            let h_diff = Math.abs(h1_prime - h2_prime);
            if (h_diff > 180) h_avg_prime += 180;
            h_avg_prime = (h_avg_prime + 360) % 360;
        }
        
        const T = 1 - 0.17 * Math.cos((h_avg_prime - 30) * Math.PI / 180)
                   + 0.24 * Math.cos((2 * h_avg_prime) * Math.PI / 180)
                   + 0.32 * Math.cos((3 * h_avg_prime + 6) * Math.PI / 180)
                   - 0.20 * Math.cos((4 * h_avg_prime - 63) * Math.PI / 180);
        
        const dTheta = 30 * Math.exp(-Math.pow((h_avg_prime - 275) / 25, 2));
        const RC = 2 * Math.sqrt(Math.pow(C_avg_prime, 7) / (Math.pow(C_avg_prime, 7) + Math.pow(25, 7)));
        const SL = 1 + (0.015 * Math.pow(L_avg_prime - 50, 2)) / Math.sqrt(20 + Math.pow(L_avg_prime - 50, 2));
        const SC = 1 + 0.045 * C_avg_prime;
        const SH = 1 + 0.015 * C_avg_prime * T;
        const RT = -Math.sin(2 * dTheta * Math.PI / 180) * RC;
        
        const term1 = dL_prime / SL;
        const term2 = dC_prime / SC;
        const term3 = dh_prime / SH;
        
        return Math.sqrt(term1 * term1 + term2 * term2 + term3 * term3 + RT * term2 * term3);
    }
    
    // 使用 CIEDE2000 算法查找最接近的 Perler 颜色
    function findClosestPerlerColor(r, g, b) {
        const targetLab = rgbToLab(r, g, b);
        let minDelta = Infinity;
        let best = PERLER_COLORS[0];
        
        for (const color of PERLER_COLORS) {
            const colorLab = rgbToLab(color.rgb[0], color.rgb[1], color.rgb[2]);
            const delta = deltaE2000(targetLab, colorLab);
            if (delta < minDelta) {
                minDelta = delta;
                best = color;
            }
        }
        return best;
    }

    // 全局变量
    let currentColorMatrix = null;
    let canvasElement = document.getElementById('patternCanvas');
    let ctx = canvasElement.getContext('2d');
    let currentCellSize = 24;

    // 将图片像素矩阵映射到 Perler 色板
    function quantizeToPerler(imageData, width, height) {
        const data = imageData.data;
        const colorMatrix = Array(height).fill().map(() => Array(width).fill(null));
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const idx = (y * width + x) * 4;
                const r = data[idx];
                const g = data[idx + 1];
                const b = data[idx + 2];
                const perler = findClosestPerlerColor(r, g, b);
                colorMatrix[y][x] = perler;
            }
        }
        return colorMatrix;
    }

    // 绘制带网格 + 色号标记的图纸
    function drawPattern(ctx, colorMatrix, cellSize, width, height) {
        const w = width;
        const h = height;
        ctx.clearRect(0, 0, w * cellSize, h * cellSize);
        
        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const perler = colorMatrix[y][x];
                const [r,g,b] = perler.rgb;
                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
            }
        }
        
        // 网格线
        ctx.beginPath();
        ctx.strokeStyle = "#3a2a30";
        ctx.lineWidth = 1;
        for (let y = 0; y <= h; y++) {
            ctx.moveTo(0, y * cellSize);
            ctx.lineTo(w * cellSize, y * cellSize);
            ctx.stroke();
        }
        for (let x = 0; x <= w; x++) {
            ctx.moveTo(x * cellSize, 0);
            ctx.lineTo(x * cellSize, h * cellSize);
            ctx.stroke();
        }
        
        // 色号标记
        ctx.font = `${Math.max(9, cellSize * 0.3)}px "Courier New", monospace`;
        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const perler = colorMatrix[y][x];
                const label = perler.label;
                const centerX = x * cellSize + cellSize / 2;
                const centerY = y * cellSize + cellSize / 2;
                const [r,g,b] = perler.rgb;
                const brightness = r * 0.299 + g * 0.587 + b * 0.114;
                ctx.fillStyle = brightness > 140 ? "#1a1a1a" : "#f9f9f9";
                ctx.fillText(label, centerX - ctx.measureText(label).width / 2, centerY + cellSize * 0.12);
            }
        }
    }
    
    // 渲染主函数
    function renderFromMatrix(colorMatrix, targetCanvas, cellSize = 26) {
        if (!colorMatrix) return;
        const h = colorMatrix.length;
        const w = colorMatrix[0].length;
        currentCellSize = cellSize;
        targetCanvas.width = w * cellSize;
        targetCanvas.height = h * cellSize;
        const canvasCtx = targetCanvas.getContext('2d');
        drawPattern(canvasCtx, colorMatrix, cellSize, w, h);
        
        // 更新统计
        const colorCount = new Map();
        for(let row of colorMatrix) {
            for(let col of row) {
                const key = col.label;
                colorCount.set(key, (colorCount.get(key) || 0) + 1);
            }
        }
        const statsDiv = document.getElementById('statsPanel');
        let colorDetail = Array.from(colorCount.entries()).slice(0, 10).map(([code, cnt]) => `${code}:${cnt}`).join(' · ');
        if(colorCount.size > 10) colorDetail += ' …';
        statsDiv.innerHTML = `📏 网格尺寸: ${w} x ${h} &nbsp;| 🧩 总豆数: ${w*h}<br>🎨 使用色号: ${colorDetail} | 色板: 65色 | 算法: CIEDE2000`;
        
        // 更新手动修改界面的下拉菜单
        updateColorSelect();
    }
    
    // 更新颜色下拉菜单
    function updateColorSelect() {
        const select = document.getElementById('colorSelect');
        select.innerHTML = '<option value="">选择要更改的颜色号码</option>';
        PERLER_COLORS.forEach(c => {
            const option = document.createElement('option');
            option.value = c.label;
            option.textContent = `${c.label} - ${c.name}`;
            select.appendChild(option);
        });
    }
    
    // 修改指定坐标的颜色
    function changeColorAt(x, y, newColorLabel) {
        if (!currentColorMatrix) {
            alert("请先上传图片生成图纸");
            return false;
        }
        const h = currentColorMatrix.length;
        const w = currentColorMatrix[0].length;
        if (x < 0 || x >= w || y < 0 || y >= h) {
            alert(`坐标超出范围！X: 0-${w-1}, Y: 0-${h-1}`);
            return false;
        }
        const targetColor = PERLER_COLORS.find(c => c.label === newColorLabel);
        if (!targetColor) {
            alert("无效的色号");
            return false;
        }
        currentColorMatrix[y][x] = targetColor;
        renderFromMatrix(currentColorMatrix, canvasElement, currentCellSize);
        return true;
    }
    
    // 处理上传图片
    function processImage(file) {
        if (!file) return;
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = function() {
            URL.revokeObjectURL(url);
            let targetWidth = img.width;
            let targetHeight = img.height;
            const MAX_SIZE = 48;
            if (targetWidth > MAX_SIZE && targetWidth >= targetHeight) {
                targetHeight = Math.floor(targetHeight * (MAX_SIZE / targetWidth));
                targetWidth = MAX_SIZE;
            } else if (targetHeight > MAX_SIZE) {
                targetWidth = Math.floor(targetWidth * (MAX_SIZE / targetHeight));
                targetHeight = MAX_SIZE;
            }
            targetWidth = Math.max(1, targetWidth);
            targetHeight = Math.max(1, targetHeight);
            
            const offCanvas = document.createElement('canvas');
            offCanvas.width = targetWidth;
            offCanvas.height = targetHeight;
            const offCtx = offCanvas.getContext('2d');
            offCtx.drawImage(img, 0, 0, targetWidth, targetHeight);
            const imageData = offCtx.getImageData(0, 0, targetWidth, targetHeight);
            const colorMatrix = quantizeToPerler(imageData, targetWidth, targetHeight);
            currentColorMatrix = colorMatrix;
            
            const containerWidth = Math.min(600, window.innerWidth - 80);
            let cellSize = Math.floor(containerWidth / targetWidth);
            cellSize = Math.min(34, Math.max(18, cellSize));
            renderFromMatrix(colorMatrix, canvasElement, cellSize);
        };
        img.src = url;
    }
    
    // 导出PDF
    async function exportAsPDF() {
        if (!currentColorMatrix) {
            alert("请先上传一张图片生成拼豆图纸");
            return;
        }
        const exportCellSize = 30;
        const w = currentColorMatrix[0].length;
        const h = currentColorMatrix.length;
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = w * exportCellSize;
        tempCanvas.height = h * exportCellSize;
        const tempCtx = tempCanvas.getContext('2d');
        drawPattern(tempCtx, currentColorMatrix, exportCellSize, w, h);
        
        const { jsPDF } = window.jspdf;
        if (!jsPDF) {
            alert("PDF库加载中，请稍后重试");
            return;
        }
        const imgData = tempCanvas.toDataURL('image/png');
        const pdf = new jsPDF({
            orientation: w > h ? 'landscape' : 'portrait',
            unit: 'mm',
        });
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = pdf.internal.pageSize.getHeight();
        const imgWidth = pdfWidth - 20;
        const imgHeight = (tempCanvas.height / tempCanvas.width) * imgWidth;
        pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight > pdfHeight - 20 ? pdfHeight - 20 : imgHeight);
        pdf.save('perler_pattern.pdf');
    }
    
    function exportAsPNG() {
        if (!currentColorMatrix) {
            alert("请先上传图片生成图纸");
            return;
        }
        const exportCellSize = 30;
        const w = currentColorMatrix[0].length;
        const h = currentColorMatrix.length;
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = w * exportCellSize;
        tempCanvas.height = h * exportCellSize;
        const tempCtx = tempCanvas.getContext('2d');
        drawPattern(tempCtx, currentColorMatrix, exportCellSize, w, h);
        const link = document.createElement('a');
        link.download = 'perler_pattern.png';
        link.href = tempCanvas.toDataURL();
        link.click();
    }
    
    // 点击canvas获取坐标
    function setupCanvasClick() {
        canvasElement.addEventListener('click', (e) => {
            if (!currentColorMatrix) return;
            const rect = canvasElement.getBoundingClientRect();
            const scaleX = canvasElement.width / rect.width;
            const scaleY = canvasElement.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            const x = Math.floor(mouseX / currentCellSize);
            const y = Math.floor(mouseY / currentCellSize);
            const w = currentColorMatrix[0].length;
            const h = currentColorMatrix.length;
            if (x >= 0 && x < w && y >= 0 && y < h) {
                document.getElementById('coordX').value = x;
                document.getElementById('coordY').value = y;
                const currentColor = currentColorMatrix[y][x];
                const select = document.getElementById('colorSelect');
                if (currentColor) {
                    for(let i=0; i<select.options.length; i++) {
                        if(select.options[i].value === currentColor.label) {
                            select.selectedIndex = i;
                            break;
                        }
                    }
                }
            }
        });
    }
    
    // 绑定UI事件
    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    uploadArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) processImage(e.target.files[0]);
    });
    document.getElementById('resetBtn').addEventListener('click', () => {
        currentColorMatrix = null;
        ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasElement.width = 500;
        canvasElement.height = 500;
        ctx.fillStyle = "#fef4f7";
        ctx.fillRect(0, 0, 500, 500);
        document.getElementById('statsPanel').innerHTML = '✨ 等待上传图片';
        fileInput.value = '';
    });
    document.getElementById('downloadPdfBtn').addEventListener('click', exportAsPDF);
    document.getElementById('downloadImageBtn').addEventListener('click', exportAsPNG);
    document.getElementById('applyColorChangeBtn').addEventListener('click', () => {
        if (!currentColorMatrix) {
            alert("请先上传图片");
            return;
        }
        const x = parseInt(document.getElementById('coordX').value);
        const y = parseInt(document.getElementById('coordY').value);
        const newColorLabel = document.getElementById('colorSelect').value;
        if (isNaN(x) || isNaN(y)) {
            alert("请输入有效的X和Y坐标");
            return;
        }
        if (!newColorLabel) {
            alert("请选择要更改的颜色号码");
            return;
        }
        changeColorAt(x, y, newColorLabel);
    });
    
    // 显示完整色板
    const paletteDiv = document.getElementById('colorPalette');
    PERLER_COLORS.forEach(c => {
        const swatch = document.createElement('div');
        swatch.style.textAlign = 'center';
        swatch.style.margin = '0 6px 8px 6px';
        swatch.innerHTML = `<div class="color-swatch" style="background:rgb(${c.rgb[0]},${c.rgb[1]},${c.rgb[2]})" title="${c.name}"></div>
                            <div class="color-label">${c.label}</div>`;
        paletteDiv.appendChild(swatch);
    });
    
    // 初始化
    ctx.fillStyle = "#fef4f7";
    ctx.fillRect(0, 0, canvasElement.width, canvasElement.height);
    setupCanvasClick();
    updateColorSelect();
    
    // 加载jspdf
    function loadJSPDF() {
        if (window.jspdf) return;
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
        document.head.appendChild(script);
    }
    loadJSPDF();
</script>
